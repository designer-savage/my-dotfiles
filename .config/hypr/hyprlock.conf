# ─── hyprlock ──────────────────────────────────────────────────────────────
# цвета подтягиваются динамически из pywal
source = ~/.cache/wal/colors-hyprland.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

# ─── animations: smooth transitions and effects ──────────────────────────────────
animations {
    enabled = true
    bezier = easeOut, 0.25, 0.75, 0.25, 1.0
    bezier = easeIn, 0.5, 0.0, 0.75, 0.25
    bezier = easeInOut, 0.5, 0.0, 0.5, 1.0
    
    animation = fadeIn, 1, 3, easeOut
    animation = fadeOut, 1, 2, easeIn
    animation = inputFieldDots, 1, 4, easeInOut
    animation = inputFieldFade, 1, 3, easeInOut
}

# ─── background: improved blur and saturation ────────────────────────────────────
background {
    monitor =
    path = ~/wallpapers/current
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.85
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.15
}

# ─── clock: large but more balanced ───────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%-H:%M"
    color = $foreground
    font_size = 160
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ─── date: improved readability and positioning ───────────────────────────────
label {
    monitor =
    text = cmd[update:60000] LC_TIME=en_US.UTF-8 date +"%A, %B %-d, %Y"
    color = $color7
    font_size = 20
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.4)
}

# ─── password input: modern design ──────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 52
    outline_thickness = 1
    dots_size = 0.26
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(128, 128, 128, 0.7)
    inner_color = rgba(30, 30, 46, 0.6)
    font_color = $foreground
    fade_on_empty = true
    placeholder_text = <span foreground="#a6adc8">Enter password...</span>
    hide_input = false
    rounding = 8
    check_color = $color4
    fail_color = $color1
    fail_text = <i>$FAIL</i>
    capslock_color = $color3
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.3)
}
